			function setUp0(){
		  		var frames=[];

					frames.push(texture);

				app.stage.addChild(animatedMouse);
			}

			function setUp(){

				var setX = 0;

			
				
				for(var i=0; i<imagesArr.length; i++){

					var baseImg = PIXI.Texture.from(imagesArr[i].animFileName)
					//var baseImg = PIXI.Texture.from(mouseBlindJumpUp.imageFileName)
				    var baseW = baseImg.width;
					var baseH = baseImg.height;

					var charWidth = baseW/imagesArr[i].charCountH;
				    var charHeight = baseH/imagesArr[i].charCountV; 
					var imgX = 0;
					var imgY = 0;

			
					var frames = [];

					for(var j=0; j<imagesArr[i].charCount; j++){
						console.log("imgX:"+ imgX + " imgY:" + imgY )
						img = new PIXI.Texture(baseImg,new PIXI.Rectangle(imgX ,imgY,charWidth,charHeight));
					
						imgX += charWidth;

						if((imgX + charWidth > baseW)){
							imgX = 0;
							imgY += charHeight;
						}
						frames.push(img);
					}	

					animatedMouse = new PIXI.AnimatedSprite(frames);
					animatedMouse.y = 100;
					animatedMouse.x = setX
					animatedMouse.anchor.set=.05;
					animatedMouse.animationSpeed = 0.5;
					animArr.push(animatedMouse);
					app.stage.addChild(animatedMouse);
					//animatedMouse.x = animatedMouse.x + 155;
					//animatedMouse.x = 100;
					console.log(imagesArr[i].animName + ": " + animatedMouse.x)	
					setX = animatedMouse.x + charWidth;
				}
			
			}
