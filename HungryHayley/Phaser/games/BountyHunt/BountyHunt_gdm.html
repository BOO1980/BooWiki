<!DOCTYPE html>
<html lang='en'>
<head>
	<meta charset="utf-8"/>
	<title>Bounty Hunt</title>
	<script src="../../src/phaser/phaser.min.js?v1_0_17"></script>
	<script type="text/javascript">
		function addListeners(_arr){
			for(var i = 0;  i < _arr.length; i++){
				document.getElementById(_arr[i]).addEventListener(
					"touchstart",
					function(e) {
						e.preventDefault();
						e.stopProgation();
				}, false);
		}
	}
	</script>
	<style type="text/css">
		#base_background{
			/*TODO*/
			position: absolute;
			top: 0;
			left: 0;
			z-index: 1;
			background: url(media/static/background_base.jpg) no-repeat center center fixed;
			border: 0;
			height: 100%;
			width: 100%;
			margin: 0;
			padding: 0;
			/*display: none;*/
		}
		#free_background{
			position: absolute;
			top: 0;
			left: 0;
			z-index: 1;
			background: url(media/static/background_freespins.jpg) no-repeat center center fixed;
			border: 0;
			height: 100%;
			width: 100%;
			margin: 0;
			padding: 0;
			display: none;
		}
		#content{
			position: absolute;
			top:0;
			left:0;
			z-index: 5;
			max-width: 100%
			max-height: 100%;
		}

		#free_rounds{
			z-index: 8;
			position: absolute;
			top: 45%;
			left: 50%;
			/*todo*/
			padding: 0.75vw;
			display: none;

			border-style: solid;
			border-color: #006699;
			background-color: rbga(0,0,0,0.8);
			border-radius: 1vw;
			border-width: 0.2vw;
			/*todo*/
			max-width: 40%
		}
		#free_rounds_container{
			padding:0.5vw;
			border-radius:1vw;
			/*todo*/
		}
		#free_rounds_title{
			font-family: "Arial";
			font-size: 2vw;
			font-weight: bold;
			color: #fbd000;
			text-align: center;
			margin-top: 0px;
			margin-bottom: 1vw;
			text-shadow: 3px 3px 2px rgba(0,0,0,1);

		}
		#free_rounds_blocker{
			z-index: 7;
			position: absolute;
			top:0;
			left:0;
			border: 0;
			height: 100%;
			width: 100%;
			margin: 0;
			padding: 0;
			background-color: rgba(0,0,0,0.4);
			display: none;
		}

	</style>
</head>
<!-- TODO -->

<!--  -->	
<body onLoad="addListeners(['base_background','free_background'])">
	
	<div id="base_background"></div>
	<div id="free_background"></div>
	<div id="content"></div>
	<div id="free_rounds_blocker"></div>
	<div id="free_rounds"></div>
		<div id="free_rounds_container"></div>
		<h1 id=free_rounds_title>Free Spins</h1>
</body>
</html>
