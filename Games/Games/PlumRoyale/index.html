		function setUp(){
			/*Background*/
			//TODO: Mask
			gameBackground = new Sprite(resources["gameBackground.png"].texture);
		
			app.stage.addChild(gameBackground)
			
			winLinesSetUp()

			app.stage.addChild(reelFrame)
			
			setX = 0;
			
			for(var i=0; i< reelCol; i++){
				
				var symbolBG  = new Sprite(resources["blankSymbol.png"].texture);
				symbolBG.x = setX;
				reelFrame.addChild(symbolBG)
				setX = symbolBG.width + symbolBG.x
			}
			//mouseLand()			
		}

		function winLinesSetUp(){

			var leftWinlines = PIXI.Texture.from("leftWinlines.png")

/*			leftWinlines.x = reelFrame.x - (leftWinlines.width + 10)

		function stopAnim(animType){

			if(animType === "All"){

				for(i=0; i<animArr.length;i++){

					animArr[i].stop();
				}

			}else{
					//animArr[animType].stop();
				}
		}

		function spriteFactory(imageObj){

			var setX = 0;

			//for(var i=0; i<Object.keys(images).length; i++){

				var baseImg = PIXI.Texture.from(imageObj.animFileName)
				var baseW = baseImg.width;
				var baseH = baseImg.height;
				var charWidth = baseW/imageObj.charCountH;
				var charHeight = baseH/imageObj.charCountV; 
				var imgX = 0;
				var imgY = 0;

				var frames = [];

				for(var j=0; j<imageObj.charCount; j++){
					
					console.log("imgX:"+ imgX + " imgY:" + imgY )
					img = new PIXI.Texture(baseImg,new PIXI.Rectangle(imgX ,imgY,charWidth,charHeight));

					imgX += charWidth;

					if((imgX + charWidth > baseW)){
						imgX = 0;
						imgY += charHeight;
					}
				
				frames.push(img);
			}	

			animatedMouse = new PIXI.AnimatedSprite(frames);
			animatedMouse.y = 100;
			animatedMouse.x = setX
			animatedMouse.anchor.set=.05;
			animatedMouse.animationSpeed = 0.5;
			animatedMouse.loop = false;
			animArr.push(animatedMouse);
			app.stage.addChild(animatedMouse);
			//animatedMouse.x = animatedMouse.x + 155;
			//animatedMouse.x = 100;
			console.log(imagesArr[i].animName + ": " + animatedMouse.x)	
			setX = animatedMouse.x + charWidth;

		//}
	}

			function mouseFly1(){
			console.log("flyStart")
			var baseImg = PIXI.Texture.from(images.mouseFly.animFileName)

			var baseW = baseImg.width;
			var baseH = baseImg.height;
			
			var charWidth = baseW/images.mouseFly.charCountH;
			var charHeight = baseH/images.mouseFly.charCountV; 
			
			setX = gameBackground.width - 90;
			setY = (gameBackground.height/12);

			var imgX = 0;
			var imgY = 0;

			//Create an array to store texture
			var frames = [];

				for(var j=0; j<images.mouseFly.charCount; j++){
					
					img = new PIXI.Texture(baseImg,new PIXI.Rectangle(imgX ,imgY,charWidth,charHeight));

					imgX += charWidth;

					if((imgX + charWidth > baseW)){
						
						imgX = 0;
						imgY += charHeight;
					}

					frames.push(img);
				}	
			
			animatedMouse = new PIXI.AnimatedSprite(frames);
			animatedMouse.y = setY+20;
			animatedMouse.x = setX
			animatedMouse.anchor.set=.05;	
			animatedMouse.animationSpeed = 0.5/4
			animatedMouse.loop = false;
			app.stage.addChild(animatedMouse)

			TweenLite.to(animatedMouse,2,{onStart: animatedMouse.play(), onComplete: mouseLand, pixi:{x:gameBackground.width/2 - animatedMouse.width/2, y:340}});
			console.log("flyFin")
		}
