	<style>

		.navbar {
			overflow: hidden;
			background-color: #333;
			font-family: Arial, Helvetica, sans-serif;
		}

		.navbar a  {
			float: left;
			font-size: 16px;
			color: white;
			text-align: center;
			padding: 14px 16px;
			text-decoration: none;
		}
		.dropdown {
			float: left;
			overflow: hidden;
		}

		.dropdown .dropbtn, button{
			cursor: pointer;
			font-size: 16px;  
			border: none;
			outline: none;
			color: white;
			padding: 14px 16px;
			background-color: grey;
			font-family: inherit;
			margin: 0;
		}

		.dropdown:hover .dropbtn, .dropbtn:focus, button {
			background-color: red;
		}

		.dropdown-content {
			display: none;
			position: absolute;
			background-color: #f9f9f9;
			min-width: 160px;
			box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
			z-index: 1;
		}

		.dropdown-content a {
			float: none;
			color: black;
			padding: 12px 16px;
			text-decoration: none;
			display: block;
			text-align: left;
		}

		.dropdown-content a:hover {
			background-color: #ddd;
		}

		.show {
			display: block;
		}
	</style>
	<title>Mouse</title>
</head>
<body>.

				.add(imagesArr[1].animFileName)
				.add(imagesArr[2].animFileName)
				.add(imagesArr[3].animFileName)
				.add(imagesArr[4].animFileName)
				.load(setUp);

				function setUp0(){
					var frames=[];

					for(var i=0; i<4; i++){

						var texture = PIXI.Texture.from(mouseAnim[i]);
						frames.push(texture);

					animatedMouse = new PIXI.AnimatedSprite(frames);
					animatedMouse.anchor.set=.05;
					animatedMouse.animationSpeed = 0.5;
					app.stage.addChild(animatedMouse);
				}

				function setUp(){

					var setX = 0;

					for(var i=0; i<imagesArr.length; i++){

						var baseImg = PIXI.Texture.from(imagesArr[i].animFileName)
						var baseW = baseImg.width;
						var baseH = baseImg.height;

						var charWidth = baseW/imagesArr[i].charCountH;
						var charHeight = baseH/imagesArr[i].charCountV; 
						var imgX = 0;
						var imgY = 0;

						var frames = [];

					for(var j=0; j<imagesArr[i].charCount; j++){
						console.log("imgX:"+ imgX + " imgY:" + imgY )
						img = new PIXI.Texture(baseImg,new PIXI.Rectangle(imgX ,imgY,charWidth,charHeight));

						imgX += charWidth;

						if((imgX + charWidth > baseW)){
							imgX = 0;
							imgY += charHeight;
						}
						frames.push(img);
					}	

					animatedMouse = new PIXI.AnimatedSprite(frames);
					animatedMouse.y = 100;
					animatedMouse.x = setX
					animatedMouse.anchor.set=.05;
					animatedMouse.animationSpeed = 0.5;
					animArr.push(animatedMouse);
					app.stage.addChild(animatedMouse);
					//animatedMouse.x = animatedMouse.x + 155;
					//animatedMouse.x = 100;
					console.log(imagesArr[i].animName + ": " + animatedMouse.x)	
					setX = animatedMouse.x + charWidth;
				}	
			}

			function startAnim(animType){

				if(animType === "All"){

					for(i=0; i< animArr.length; i++){

						animArr[i].play();
					}
				}else{
						animArr[animType].play();
					}
				}

			function stopAnim(){

				animArr[0].stop();
				animArr[1].stop();
				animArr[2].stop();
				animArr[3].stop();
				animArr[4].stop();
			}

			function popDropDown(){

				for(i=0; i<imagesArr.length; i++){
	/*				var aElement = document.createElement("a");
					var textNode = document.createTextNode(imagesArr[i].animName)
					aElement.appendChild(textNode);
					document.getElementById('myDropdown').appendChild(aElement);*/
					document.getElementById('myDropdown').innerHTML +='<a href="#" onclick="startAnim('+ i +')">Link'+i+'</a><br/>';
				}
				document.getElementById('myDropdown').innerHTML +='<a href="#" onclick="startAnim(\'All\')">All</a>';


			}

			function dropDown(){
				document.getElementById("myDropdown").classList.toggle("show");
			}

			window.onclick = function(event){
				if(!event.target.matches('.dropbtn')){
					var dropdowns = document.getElementById("myDropdown");
					if(dropdowns.classList.contains('show')){
						dropdowns.classList.remove('show');
					}
				}
		}
		</script>
